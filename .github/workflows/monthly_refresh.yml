name: Monthly Fundamentals Refresh

# ─── CUÁNDO SE EJECUTA ──────────────────────────────────────────
on:
  schedule:
    # Día 1 de cada mes a las 06:00 UTC (08:00 Madrid)
    - cron: '0 6 1 * *'
  workflow_dispatch:  # También manualmente

permissions:
  contents: write

jobs:
  refresh-fundamentals:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Más tiempo: hasta 1 hora

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh universe
        run: |
          echo "🌍 Actualizando universo de tickers..."
          python universe.py
          echo "✅ Universo actualizado"

      - name: Refresh fundamentals
        run: |
          echo "📊 Refrescando fundamentales (esto tarda 10-15 min)..."
          python fundamentals.py --force
          echo "✅ Fundamentales actualizados"

      - name: Run scan
        run: python main.py

      - name: Generate HTML
        run: python html_generator.py

      - name: Commit and push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "🔄 Monthly refresh $(date +'%Y-%m')"
          git push
